name: Poll CDC Update Times

on:
  schedule:
    - cron: "0 */6 * * *"        # baseline every 6h at :00
    - cron: "30 9-21 * * 4"      # hourly Thu 09:30–21:30 UTC (±6h of ~15:00, hosp prelim)
    - cron: "30 1-13 * * 5"      # hourly Fri 01:30–13:30 UTC (±6h of ~07:00, wastewater)
    - cron: "30 7-22 * * 6"      # hourly Sat 07:30–22:30 UTC (±6h of ~14:30, hosp final + ED)
  workflow_dispatch:

concurrency:
  group: poll-update-times
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: update-time-log

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Poll CDC endpoints
        run: python check_update_times.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add update_log.csv
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: poll CDC update times"
          git push origin update-time-log
