name: Weekly Discord Post

on:
  schedule:
    # Every Thursday at 22:00 UTC (18:00 EDT) — after hosp prelim publishes
    # (~15–19 UTC Thu). ED visits, hosp final, and wastewater all publish
    # Saturday, after the Friday game, so this is the freshest data available.
    - cron: "0 22 * * 4"
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post to Discord
        run: python post_to_discord.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
